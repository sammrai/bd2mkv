name: Check MakeMKV version

on:
  schedule:
    - cron: '0 8 * * 1'  # Mondays 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect latest MakeMKV release
        id: ver
        run: |
          set -euo pipefail
          LATEST=$(curl -fsSL https://www.makemkv.com/download/ \
            | grep -oE 'makemkv-oss-[0-9]+\.[0-9]+\.[0-9]+\.tar\.gz' \
            | sed 's/makemkv-oss-\(.*\)\.tar\.gz/\1/' \
            | sort -V | tail -1)
          CURRENT=$(awk -F= '/^ARG MAKEMKV_VERSION=/{print $2}' Dockerfile)
          echo "latest=$LATEST"   >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Latest: $LATEST  Current: $CURRENT"

      - name: Bump Dockerfile if newer
        if: steps.ver.outputs.latest != '' && steps.ver.outputs.latest != steps.ver.outputs.current
        run: |
          sed -i "s/^ARG MAKEMKV_VERSION=.*/ARG MAKEMKV_VERSION=${{ steps.ver.outputs.latest }}/" Dockerfile
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git commit -m "Bump MakeMKV to ${{ steps.ver.outputs.latest }}"
          git push

      - name: Trigger image build
        if: steps.ver.outputs.latest != '' && steps.ver.outputs.latest != steps.ver.outputs.current
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run build.yml --ref main
